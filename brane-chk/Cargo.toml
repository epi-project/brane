rust-version = "1.74"
version.workspace = true
repository.workspace = true
authors = ["Tim Müller", "Bas Kloosterman", "Daniel Voogsgerd"]
license.workspace = true


[dependencies]
thiserror = "1.0.61"
tracing = "0.1.40"

enum-debug = { git = "https://github.com/Lut99/enum-debug", tag = "v1.1.0" }
